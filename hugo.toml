# Root site config. Language-specific settings live under [languages.*].
baseURL = 'https://piergst.github.io/'
theme = "PaperMod"

# Default language = EN → English URLs have no /en/ prefix (only /fr/ is prefixed).
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false


[params]
  # Show languageName (emoji flag) instead of fallback "Fr"/"En" text in the switcher.
  displayFullLangName = true
  hideFooter = true
  # Copy button handled in layouts/partials/extend_footer.html — disable built-in to avoid duplicates.
  ShowCodeCopyButtons = false
  # Estimated reading time in article meta (both on list and single view).
  ShowReadingTime = true

  # Logo in the site header — two concentric rings, accent stroke.
  [params.label]
    icon = "/header-logo.svg"
    iconHeight = 32

  # Favicons. SVG covers evergreen browsers; PNG fallbacks for iOS Safari and
  # the home-screen icon (which doesn't honour the SVG media query).
  # favicon.svg = same shape as header-logo.svg with thicker strokes for 16/32 px.
  [params.assets]
    favicon = "/favicon.svg"
    favicon32x32 = "/favicon-32x32.png"
    apple_touch_icon = "/apple-touch-icon.png"


# Syntax highlighting — pick any style from https://xyproto.github.io/splash/docs/all.html
# Common picks: monokai (default), dracula, nord, one-dark, catppuccin-mocha, github-dark.
[markup]
  [markup.highlight]
    style = "github-dark"
  # Allow inline HTML (<br>, <date>, <heart>...) in markdown — safe here since all content is first-party.
  [markup.goldmark.renderer]
    unsafe = true


[languages]
  [languages.fr]
    languageName = "fr"
    languageAltTitle = "Français"
    languageCode = "fr-FR"
    weight = 2                    # language order (lowest = first/default)
    title = "Pierre Giusti"       # gates PaperMod's logo block + drives browser tab title

    # Main menu — entries ordered by weight ascending.
    [[languages.fr.menu.main]]
      name = "Accueil"
      url = "/"
      weight = 1

    [[languages.fr.menu.main]]
      name = "Articles"
      url = "/posts/"
      weight = 5

    [[languages.fr.menu.main]]
      name = "À Propos"
      url = "/about/"
      weight = 10

  [languages.en]
    languageName = "en"
    languageAltTitle = "English"
    languageCode = "en-US"
    weight = 1
    title = "Pierre Giusti"

    [[languages.en.menu.main]]
      name = "Home"
      url = "/"
      weight = 1

    [[languages.en.menu.main]]
      name = "Posts"
      url = "/posts/"
      weight = 5

    [[languages.en.menu.main]]
      name = "About"
      url = "/about/"
      weight = 10
